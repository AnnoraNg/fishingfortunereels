<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <defs>
    <linearGradient id="bf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7de8ff"/>
      <stop offset="45%" stop-color="#29b6e8"/>
      <stop offset="100%" stop-color="#0077aa"/>
    </linearGradient>
  </defs>
  <!-- tail -->
  <polygon points="178,128 220,88 208,128 220,168" fill="#29b6e8" stroke="#005577" stroke-width="4" stroke-linejoin="round"/>
  <!-- body -->
  <ellipse cx="118" cy="128" rx="80" ry="48" fill="url(#bf)" stroke="#005577" stroke-width="4" filter="url(#shadow)"/>
  <!-- scales -->
  <path d="M88,133 Q88,113 108,113" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M110,133 Q110,113 130,113" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M132,133 Q132,113 152,113" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- dorsal fin -->
  <path d="M108,80 Q128,44 148,80" fill="#5dd4f0" stroke="#005577" stroke-width="3" stroke-linejoin="round"/>
  <!-- eye -->
  <circle cx="62" cy="116" r="13" fill="white" stroke="#003355" stroke-width="3"/>
  <circle cx="59" cy="116" r="6.5" fill="#111"/>
  <circle cx="55" cy="112" r="3" fill="white"/>
  <!-- mouth -->
  <path d="M42,128 Q38,140 50,140" fill="none" stroke="#003355" stroke-width="3" stroke-linecap="round"/>
  <!-- pectoral fin -->
  <path d="M110,155 Q100,185 130,175 Q135,158 110,155" fill="#29b6e8" stroke="#005577" stroke-width="2.5"/>

</svg>